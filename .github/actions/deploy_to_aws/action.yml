name: Deploy to AWS
inputs:
  docker_tag:
    description: "Commit short SHA"
    required: true
    type: string
  stack_name:
    description: "Pulumi stack name (S3-backend form, e.g. 'staging' or 'production')"
    required: true
    type: string
  aws_region:
    required: true
    type: string
  aws_role_arn:
    description: "ARN of the IAM role to assume via GitHub OIDC (e.g. arn:aws:iam::<acct>:role/pulumi-ci-<repo>-<env>)"
    required: true
    type: string
  pulumi_command:
    type: string
    default: preview
  pulumi_diff:
    default: "false"
  OP_SERVICE_ACCOUNT_TOKEN:
    required: true
  CLOUDFLARE_API_TOKEN:
    required: false
    default: ""
runs:
  using: composite
  steps:
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}
    - name: Pulumi login (S3 backend)
      shell: bash
      run: pulumi login s3://passportxyz-pulumi-state
    - run: |
        pulumi stack select -c ${{ inputs.stack_name }}
        pulumi config -s ${{ inputs.stack_name }} set aws:region ${{ inputs.aws_region }} --non-interactive
      shell: bash
      working-directory: infra/aws
    - uses: pulumi/actions@v5
      id: pulumi
      with:
        command: ${{ inputs.pulumi_command }}
        diff: ${{ inputs.pulumi_diff }}
        stack-name: ${{ inputs.stack_name }}
        upsert: false
        work-dir: infra/aws
      env:
        AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        DOCKER_IMAGE_TAG: ${{ inputs.docker_tag }}
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.OP_SERVICE_ACCOUNT_TOKEN }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.CLOUDFLARE_API_TOKEN }}
